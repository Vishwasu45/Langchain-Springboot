<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Chat Assistant powered by LangChain4j with local Llama model">
    <title>LangChain4j AI Assistant</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🤖</span>
                    <h1>LangChain4j Assistant</h1>
                </div>
                <div class="header-badges">
                    <span class="badge badge-model">🦙 Llama 3.1 (Local)</span>
                    <span class="badge badge-tools">🔧 3 Tools Active</span>
                </div>
            </div>
        </header>

        <!-- Tool Info Bar -->
        <div class="tool-bar">
            <div class="tool-item" data-tooltip="Ask about weather in any city">
                <span class="tool-icon">🌤️</span>
                <span class="tool-name">Weather</span>
            </div>
            <div class="tool-item" data-tooltip="Perform mathematical calculations">
                <span class="tool-icon">🧮</span>
                <span class="tool-name">Calculator</span>
            </div>
            <div class="tool-item" data-tooltip="Search the web for information">
                <span class="tool-icon">🔍</span>
                <span class="tool-name">Web Search</span>
            </div>
        </div>

        <!-- Chat Messages -->
        <main class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <div class="welcome-icon">✨</div>
                <h2>Welcome!</h2>
                <p>I'm your AI assistant powered by a local Llama model. I have access to tools for weather, calculations, and web search.</p>
                <div class="prompt-suggestions">
                    <button class="suggestion-btn" onclick="sendSuggestion('What\'s the weather in Tokyo?')">
                        🌤️ Weather in Tokyo?
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Calculate 145 * 37 + 89')">
                        🧮 Calculate 145 × 37 + 89
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Search for latest Java 21 features')">
                        🔍 Java 21 features
                    </button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="Ask me anything... Try 'What's the weather in London?' or 'Calculate 25 * 4'"
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="sendBtn" onclick="sendMessage()" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <span class="session-info" id="sessionInfo">Session: new</span>
                <span class="char-count" id="charCount">0 / 2000</span>
            </div>
        </footer>
    </div>

    <script>
        let sessionId = null;
        let isLoading = false;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const charCount = document.getElementById('charCount');
        const sessionInfo = document.getElementById('sessionInfo');

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            charCount.textContent = `${this.value.length} / 2000`;
        });

        // Send on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendSuggestion(text) {
            messageInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser) {
            // Remove welcome message on first interaction
            const welcome = chatContainer.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? '👤' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            // Format the content (handle newlines, code blocks)
            bubble.innerHTML = formatMessage(content);

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatContainer.appendChild(msgDiv);

            // Animate in
            requestAnimationFrame(() => msgDiv.classList.add('visible'));

            scrollToBottom();
            return msgDiv;
        }

        function formatMessage(text) {
            // Escape HTML
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Convert newlines to <br>
            text = text.replace(/\n/g, '<br>');
            // Bold text between **
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Inline code between backticks
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            return text;
        }

        function showTypingIndicator() {
            const typing = document.createElement('div');
            typing.className = 'message assistant-message typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-bubble">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(typing);
            requestAnimationFrame(() => typing.classList.add('visible'));
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            messageInput.value = '';
            messageInput.style.height = 'auto';
            charCount.textContent = '0 / 2000';

            addMessage(message, true);
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: message
                    })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (data.sessionId) {
                    sessionId = data.sessionId;
                    sessionInfo.textContent = `Session: ${sessionId.substring(0, 8)}...`;
                }

                addMessage(data.response, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage('⚠️ Connection error. Make sure the server and Ollama are running.', false);
                console.error('Chat error:', error);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
