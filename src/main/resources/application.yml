spring:
  application:
    name: langchain-springboot

server:
  port: 8080

# LangChain4j Ollama Configuration (local Llama model)
langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3.2
      temperature: 0.7
      timeout: PT120S
      log-requests: true
      log-responses: true
